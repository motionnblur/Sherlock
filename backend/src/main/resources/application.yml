app:
  jwt:
    # IMPORTANT: Override JWT_SECRET in production with a base64-encoded 512-bit random key.
    # Generate: openssl rand -base64 64
    secret: ${JWT_SECRET:U2hlcmxvY2tHQ1MtZGVmYXVsdC1kZXYta2V5LW11c3QtYmUtY2hhbmdlZC1pbi1wcm9kdWN0aW9uLVNIQS01MTItbWluaW11bQ==}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  simulator:
    fleet-size: ${SIMULATOR_FLEET_SIZE:5000}
  telemetry:
    last-known-cache-size: ${TELEMETRY_LAST_KNOWN_CACHE_SIZE:10000}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sherlock}
    username: ${DB_USER:sherlock}
    password: ${DB_PASSWORD:sherlock}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

server:
  port: 8080

logging:
  level:
    com.sherlock: INFO
    org.springframework.web.socket: WARN
