version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sherlock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-sherlock}
      POSTGRES_USER:     ${DB_USER:-sherlock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sherlock}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-sherlock}"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - sherlock-net

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: sherlock-backend
    restart: on-failure
    environment:
      DB_HOST:               postgres
      DB_PORT:               5432
      DB_NAME:               ${DB_NAME:-sherlock}
      DB_USER:               ${DB_USER:-sherlock}
      DB_PASSWORD:           ${DB_PASSWORD:-sherlock}
      # IMPORTANT: Override JWT_SECRET with a real key in production.
      # Generate: openssl rand -base64 64
      # The fallback below is a dev-only placeholder — never use it in production.
      JWT_SECRET:            ${JWT_SECRET:-U2hlcmxvY2tHQ1MtZGVmYXVsdC1kZXYta2V5LW11c3QtYmUtY2hhbmdlZC1pbi1wcm9kdWN0aW9uLVNIQS01MTIta2V5}
      JWT_EXPIRATION_HOURS:  ${JWT_EXPIRATION_HOURS:-8}
      # Dev seed user — created on startup if username does not exist.
      # Defaults make local compose usable without a copied .env file.
      # Override both values in production.
      DEV_SEED_USER:         ${DEV_SEED_USER:-admin}
      DEV_SEED_PASSWORD:     ${DEV_SEED_PASSWORD:-sherlock}
      SIMULATOR_FLEET_SIZE:  ${SIMULATOR_FLEET_SIZE:-5}
      TELEMETRY_LAST_KNOWN_CACHE_SIZE: ${TELEMETRY_LAST_KNOWN_CACHE_SIZE:-10000}
      # /hls is proxied by nginx to mediamtx:8888 inside Docker — browser-reachable
      MEDIAMTX_HLS_BASE_URL: /hls
      # MAVLink UDP adapter — set MAVLINK_ENABLED=true to activate
      MAVLINK_ENABLED:  ${MAVLINK_ENABLED:-false}
      MAVLINK_UDP_PORT: ${MAVLINK_UDP_PORT:-14550}
    ports:
      - "8080:8080"
      - "14550:14550/udp"   # MAVLink telemetry ingest (drone / SITL → GCS)
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sherlock-net

  # ── React Frontend — Production (nginx, static build) ────────────────────────
  frontend:
    profiles: [prod]
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_WS_URL:       ""         # empty → nginx proxies /ws-skytrack to backend
        VITE_CESIUM_TOKEN: ${VITE_CESIUM_TOKEN:-}
    container_name: sherlock-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - mediamtx
    networks:
      - sherlock-net

  # ── React Frontend — Development (Vite dev server, HMR enabled) ──────────────
  frontend-dev:
    profiles: [dev]
    build:
      context:    ./frontend
      dockerfile: Dockerfile.dev
    container_name: sherlock-frontend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL:         http://backend:8080
      MEDIAMTX_URL:        http://mediamtx:8888
      CHOKIDAR_USEPOLLING: "true"
      VITE_CESIUM_TOKEN:   ${VITE_CESIUM_TOKEN:-}
    depends_on:
      - backend
      - mediamtx
    networks:
      - sherlock-net

  # ── ArduPilot SITL — Optional MAVLink source for development ─────────────────
  sitl:
    profiles: [sitl]
    image: ardupilot/ardupilot-dev-chibios:latest
    container_name: sherlock-sitl
    working_dir: /ardupilot
    command: >-
      /bin/bash -lc "
      if [ ! -f Tools/autotest/sim_vehicle.py ]; then
        echo 'Missing ArduPilot checkout at /ardupilot. Set ARDUPILOT_REPO in .env to your local ardupilot path.';
        exit 1;
      fi;
      if [ -d .git ]; then
        git config --global --add safe.directory /ardupilot;
      fi;
      if [ ! -f modules/waf/waf-light ]; then
        if [ ! -d .git ]; then
          echo 'ArduPilot submodules are missing and /ardupilot is not a git checkout. Provide a full git clone in ARDUPILOT_REPO.';
          exit 1;
        fi;
        echo 'Initializing ArduPilot git submodules (required for waf)...';
        git submodule update --init --recursive;
      fi;
      if ! python3 -c 'import pymavlink' >/dev/null 2>&1; then
        echo 'Installing required SITL Python dependencies (pymavlink, MAVProxy)...';
        python3 -m pip install --no-cache-dir pymavlink MAVProxy;
      fi;
      Tools/autotest/sim_vehicle.py -v ${SITL_VEHICLE:-ArduCopter} --out=udp:backend:${MAVLINK_UDP_PORT:-14550}
      "
    volumes:
      - ${ARDUPILOT_REPO:-./ardupilot}:/ardupilot
    depends_on:
      - backend
    stdin_open: true
    tty: true
    networks:
      - sherlock-net

  # ── MediaMTX — RTSP/HLS media proxy (drone camera simulator) ─────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: sherlock-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP ingest (FFmpeg feeds here)
      - "8888:8888"   # HLS output  (frontend consumes)
      - "8889:8889"   # WebRTC output (future use)
    networks:
      - sherlock-net

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  sherlock-net:
    driver: bridge

# ── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
